apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: panigrahan

spec:
  replicas: 2
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend

        image: BACKEND_IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_NAME

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DB_USER

        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DB_PASS
        
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET

        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"

          limits:
            memory: "512Mi"
            cpu: "500m"

        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15


---
apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: panigrahan

spec:
  type: NodePort

  selector:
    app: backend

  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30081