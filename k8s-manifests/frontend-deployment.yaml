apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: panigrahan

spec:
  replicas: 2
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:

      - name: frontend

        image: FRONTEND_IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        env:

        - name: VITE_API_BASE_URL
          value: "http://backend-service:8080"

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "250m"

        readinessProbe:
          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 30
          periodSeconds: 15


---
apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: panigrahan

spec:
  selector:
    app: frontend

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080

  type: NodePort